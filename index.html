<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <link rel="stylesheet" href="style.css"
</head>

<body>

    <div class="hero-section">
        <header>
            <h1 class="header-logo">Header Logo</h1>
            <nav>
                <ul>
                    <li>header link one</li>
                    <li>header link two</li>
                    <li>header link three</li>
                </ul>
            </nav>
        </header>

        <main>
            <div class="hero-text-and-secondary-text-and-image">
                <div class="hero-text-and-hero-secondary-text">
                    <h2 class="hero-main-text">This website is awesome</h2>
                    <p class="hero-secondary-text">This website has some subtext that goes here under the main title. It's a smaller font and the color is lower contrast</p>
                    <button>Sign up</button>
                </div>
                <div class="comic-image">
                    <img src="./img/erik-mclean-unsplash.avif"
                    alt="A photo of comic books"
                    width="400">
                </div>
            </div>
        </main>
    </div>

</body>
</html>
